<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Workout Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h1>🏋️ Workout Tracker</h1>
    </nav>

    <div class="container">

        <!-- FORM -->
        <div class="form-container">

            <input
                type="text"
                id="name"
                placeholder="Nome workout"
            >

            <input
                type="date"
                id="date"
            >

            <input
                type="number"
                id="duration"
                placeholder="Durata minuti"
            >

            <button id="addWorkoutBtn">
                Aggiungi
            </button>

        </div>

        <!-- FILTRI -->
        <div class="filters">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Cerca workout..."
            >

            <input
                type="date"
                id="dateFilter"
            >

        </div>

        <div class="stats-container">

            <div class="stat-card">
                <h2 id="totalWorkouts">0</h2>
                <p>Workout Totali</p>
            </div>

            <div class = "stat-card">
                <h2 id = "totalMinutes">0</h2>
                <p> Minuti Totali</p>
            </div>

            <div class = "stat-card">
                <h2 id = "averageDuration">0</h2>
                <p>Media Minuti</p>
            </div>
            
        </div>

        <div class="comparison-section">

            <button onclick="openComparisonPage()">
                📈 Confronto
            </button>
        </div>

        <div class = "chart-container">
            <canvas id = "workoutChart"></canvas> <!-- canvas è dove verrà diseganto il grafico-->
        </div>

        <!-- LISTA -->
        <div id="workoutList">

        </div>

    </div>

    <script src = "https://cdn.jsdelivr.net/npm/chart.js"></script> <!--carica la libreiria-->

    <script src="script.js"></script>

</body>

</html>
